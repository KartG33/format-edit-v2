  <div class="toast" id="toast"></div>

  <script>
    // ══════════════════════════════════════
    // SERVICE WORKER
    // ══════════════════════════════════════
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => { });
    }

    // ══════════════════════════════════════
    // STATE
    // ══════════════════════════════════════

    // Словарь паттернов — порядок важен: составные до одиночных
    const DICT = [
      // Заголовки
      '######', '#####', '####', '###', '##', '#',
      // Жирный / курсив / горизонтальная линия
      '***', '**', '*', '___', '__', '_', '---',
      // Списки и цитаты
      '~~', '+', '1.', '>', '-',
      // Код
      '```', '`',
      // Ссылки и медиа
      '[', ']', '(', ')', '!',
      // Таблицы и прочее
      '|', ':', '\\'
    ];

    // Парные скобки для автозамены
    const PAIRS = {
      '(': ')', ')': '(',
      '[': ']', ']': '[',
      '{': '}', '}': '{',
      '<': '>', '>': '<',
      '«': '»', '»': '«',
      '"': '"', '"': '"',
      '\u2018': '\u2019', '\u2019': '\u2018',
    };
    const PAIR_LABELS = {
      '(': '( … )', '[': '[ … ]', '{': '{ … }', '<': '< … >',
      '«': '« … »', '"': '" … "',
    };

    // Детектор эмодзи
    const EMOJI_RE = /\p{Emoji_Presentation}|\p{Extended_Pictographic}/gu;

    const ed = document.getElementById('ed');
    let hist = [''], hIdx = 0;
    let removedSet = new Set();
    let removeEmoji = false;
    let originalText = '';
    let currentFileName = null;
    let fileHandle = null;
    let currentTab = 'detect';

    // ══════════════════════════════════════
    // RENDER
    // ══════════════════════════════════════
    function render() {
      // При обычном render — текст в поле IS the original (нет активных удалений)
      originalText = ed.value;
      removedSet.clear();
      removeEmoji = false;
      updateStats();
      if (currentTab === 'detect') renderSymbols();
    }

    function updateStats() {
      const t = ed.value;
      const words = t.trim() ? t.trim().split(/\s+/).length : 0;
      document.getElementById('sc').textContent = t.length;
      document.getElementById('sw').textContent = words;

      // Предложения и абзацы — показываем при достаточном объёме текста
      const sentChip = document.getElementById('sent-chip');
      const paraChip = document.getElementById('para-chip');
      if (t.trim().length > 20) {
        const sentMatches = t.match(/[.!?…]+[\s\n]/g) || [];
        const sentences = sentMatches.length + 1;
        const paragraphs = t.split(/\n\s*\n/).filter(p => p.trim().length > 0).length || 1;
        document.getElementById('ss').textContent = sentences;
        document.getElementById('sp').textContent = paragraphs;
        sentChip.style.display = '';
        paraChip.style.display = paragraphs > 1 ? '' : 'none';
      } else {
        sentChip.style.display = 'none';
        paraChip.style.display = 'none';
      }

      // diff pill — показываем разницу с originalText
      const diff = originalText.length - t.length;
      const pill = document.getElementById('diff-pill');
      if (diff !== 0) {
        pill.style.display = 'block';
        pill.textContent = diff > 0 ? `−${diff} симв.` : `+${Math.abs(diff)} симв.`;
        pill.className = 'diff-pill ' + (diff > 0 ? 'pos' : 'neg');
      } else {
        pill.style.display = 'none';
      }
    }

    // Применяет удаления с приоритетом длины (длинные → короткие)
    // Каждый паттерн удаляется ТОЛЬКО как самостоятельное вхождение,
    // не трогая более длинные паттерны из того же символа.
    function applyRemovals(text) {
      const sorted = [...removedSet].sort((a, b) => b.length - a.length);
      sorted.forEach(pat => {
        text = removeExact(text, pat);
      });
      if (removeEmoji) {
        text = text.replace(EMOJI_RE, '');
      }
      return text;
    }

    // Удаляет только «точные» вхождения паттерна:
    // вхождение считается точным, если символ паттерна не продолжается
    // ни слева, ни справа (нет того же символа рядом).
    function removeExact(text, pat) {
      const ch = pat[0]; // опорный символ (все символы паттерна одинаковы для #,*,_,-)
      const allSame = pat.split('').every(c => c === ch);

      if (!allSame) {
        // Для разнородных паттернов (~~, ```, 1., >, +, \, |, :) —
        // удаляем только если слева и справа нет того же ch
        // Используем простой split, они не могут быть «частью более длинного»
        return text.split(pat).join('');
      }

      // Для однородных паттернов (#, ##, ###, *, **, ***, _, __, ___, ---)
      // удаляем вхождение только если:
      //   - слева нет ch (или начало строки)
      //   - справа нет ch (или конец строки)
      const len = pat.length;
      let result = '';
      let i = 0;
      while (i < text.length) {
        // Проверяем совпадение с паттерном начиная с позиции i
        if (text.startsWith(pat, i)) {
          const before = i > 0 ? text[i - 1] : null;
          const after = i + len < text.length ? text[i + len] : null;
          const leftOk = before !== ch;
          const rightOk = after !== ch;
          if (leftOk && rightOk) {
            // Точное совпадение — удаляем (не добавляем в result)
            i += len;
            continue;
          }
        }
        result += text[i];
        i++;
      }
      return result;
    }

    // ══════════════════════════════════════
    // SYMBOL DETECTION
    // ══════════════════════════════════════

    // Считает только «точные» вхождения паттерна (аналогично removeExact)
    function countPattern(text, pat) {
      const ch = pat[0];
      const allSame = pat.split('').every(c => c === ch);

      if (!allSame) {
        // Разнородный паттерн — считаем все вхождения
        let n = 0, idx = 0;
        while ((idx = text.indexOf(pat, idx)) !== -1) { n++; idx += pat.length; }
        return n;
      }

      // Однородный — считаем только точные (не часть более длинного)
      const len = pat.length;
      let n = 0, i = 0;
      while (i < text.length) {
        if (text.startsWith(pat, i)) {
          const before = i > 0 ? text[i - 1] : null;
          const after = i + len < text.length ? text[i + len] : null;
          if (before !== ch && after !== ch) n++;
          i += len; // в любом случае прыгаем вперёд
        } else {
          i++;
        }
      }
      return n;
    }


    function toggleSym(pat) {
      if (removedSet.has(pat)) {
        removedSet.delete(pat);
      } else {
        removedSet.add(pat);
      }
      applyAndShow();
    }

    function toggleEmoji() {
      removeEmoji = !removeEmoji;
      applyAndShow();
    }

    // Применяет текущий removedSet к оригиналу и показывает результат
    function applyAndShow() {
      // Оригинал — всегда первая запись текущей «сессии» удалений
      ed.value = applyRemovals(originalText);
      renderSymbols();
      updateStats();
    }

    // Перерисовывает панель символов по оригинальному тексту
    function renderSymbols() {
      const found = [];
      for (const pat of DICT) {
        const cnt = countPattern(originalText, pat);
        if (cnt > 0) found.push({ pat, cnt });
      }
      const emojiMatches = originalText.match(EMOJI_RE) || [];
      const emojiCount = emojiMatches.length;

      document.getElementById('sym-n').textContent = found.length + (emojiCount > 0 ? 1 : 0);

      const scroll = document.getElementById('sym-scroll');
      scroll.innerHTML = '';

      if (!found.length && !emojiCount) {
        scroll.innerHTML = '<span class="sym-empty">Не найдено</span>';
        return;
      }

      found.forEach(({ pat, cnt }) => {
        const btn = document.createElement('button');
        btn.className = 's-btn' + (removedSet.has(pat) ? ' gone' : '');
        btn.innerHTML = `<span>${pat}</span><span class="s-n">${cnt}</span>`;
        btn.addEventListener('click', () => toggleSym(pat));
        scroll.appendChild(btn);
      });

      if (emojiCount > 0) {
        const btn = document.createElement('button');
        btn.className = 's-btn emoji-btn' + (removeEmoji ? ' gone' : '');
        btn.innerHTML = `😊<span class="s-n">${emojiCount}</span>`;
        btn.addEventListener('click', toggleEmoji);
        scroll.appendChild(btn);
      }
    }

    // Возвращает текст «до удалений» — исходный текст текущей сессии
    function getRawText() {
      return originalText;
    }

    // ══════════════════════════════════════
    // TAB SWITCH
    // ══════════════════════════════════════
    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tab-detect').classList.toggle('active', tab === 'detect');
      document.getElementById('tab-replace').classList.toggle('active', tab === 'replace');
      document.getElementById('sym-scroll').style.display = tab === 'detect' ? 'flex' : 'none';
      document.getElementById('replace-panel').classList.toggle('active', tab === 'replace');
      if (tab === 'detect') render();
    }

    // ══════════════════════════════════════
    // REPLACE LOGIC
    // ══════════════════════════════════════
    document.getElementById('rp-from').addEventListener('input', updatePairHint);

    function updatePairHint() {
      const from = document.getElementById('rp-from').value;
      const hint = document.getElementById('rp-pair-hint');
      const toField = document.getElementById('rp-to');

      if (PAIRS[from]) {
        const label = PAIR_LABELS[from] || `${from} … ${PAIRS[from]}`;
        hint.textContent = `Пара: ${label} — закрывающий символ подставится автоматически`;
        hint.classList.add('visible');
        // Автоподставляем пару в поле «на», если оно пустое или тоже парное
        if (!toField.value || PAIRS[toField.value]) {
          // не трогаем — пользователь сам выберет что заменить на
        }
      } else {
        hint.classList.remove('visible');
      }
    }

    function doReplace() {
      const from = document.getElementById('rp-from').value;
      const to = document.getElementById('rp-to').value;
      if (!from) { toast('Введите символ для замены'); return; }

      const before = ed.value;
      let after = before;

      // Основная замена
      after = after.split(from).join(to);

      // Парная замена: если from имеет пару — заменяем и её
      if (PAIRS[from]) {
        const fromClose = PAIRS[from];
        // Пара для «на»: если to тоже открывающий — берём его закрывающий, иначе используем PAIRS[from] → PAIRS[to] или пустую строку
        const toClose = PAIRS[to] || '';
        after = after.split(fromClose).join(toClose);
      }

      if (after === before) { toast('Символ не найден в тексте'); return; }

      saveHist(before);
      ed.value = after;
      saveHist(after);
      removedSet.clear();
      render();

      const cnt = (before.split(from).length - 1);
      const pairMsg = PAIRS[from] ? ' + парный символ' : '';
      toast(`✓ Заменено ${cnt} вхожд.${pairMsg}`);
    }

    function clearReplace() {
      document.getElementById('rp-from').value = '';
      document.getElementById('rp-to').value = '';
      document.getElementById('rp-pair-hint').classList.remove('visible');
    }

    // ══════════════════════════════════════
    // HISTORY
    // ══════════════════════════════════════
    function saveHist(val) {
      if (hist[hIdx] === val) return;
      hist = hist.slice(0, hIdx + 1);
      hist.push(val);
      hIdx = hist.length - 1;
      if (hist.length > 150) { hist.shift(); hIdx--; }
    }

    function setValue(val, addHist = true) {
      if (addHist) saveHist(ed.value);
      ed.value = val;
      if (addHist) saveHist(val);
      ed.scrollTop = 0;
      removedSet.clear();
      render();
    }

    function doUndo() {
      if (hIdx > 0) { hIdx--; ed.value = hist[hIdx]; removedSet.clear(); render(); }
    }
    function doRedo() {
      if (hIdx < hist.length - 1) { hIdx++; ed.value = hist[hIdx]; removedSet.clear(); render(); }
    }

    // ══════════════════════════════════════
    // FORMAT CATEGORIES
    // ══════════════════════════════════════
    const FMT_CATS = {
      spaces: [
        { label: '×2 пробелы', fn: 'fmt_spaces' },
        { label: 'Неразрывные', fn: 'fmt_nbsp' },
        { label: 'Обрезать края', fn: 'fmt_trim' },
      ],
      register: [
        { label: 'АА ВЕРХНИЙ', fn: 'fmt_upper' },
        { label: 'аа нижний', fn: 'fmt_lower' },
        { label: 'Аа Каждое Слово', fn: 'fmt_title' },
        { label: 'Аа предложения', fn: 'fmt_sentence' },
      ],
      punct: [
        { label: 'Пробел до знака', fn: 'fmt_space_before' },
        { label: 'Пробел после знака', fn: 'fmt_space_after' },
        { label: 'Убрать пунктуацию', fn: 'fmt_remove_punct' },
        { label: 'Убрать ( ) [ ]', fn: 'fmt_remove_brackets' },
        { label: 'Заменить пунктуацию', fn: 'fmt_replace_punct' },
      ],
      struct: [
        { label: 'Лишние строки', fn: 'fmt_lines' },
        { label: 'Одна строка', fn: 'fmt_oneline' },
        { label: 'По предложениям', fn: 'fmt_sentlines' },
        { label: 'Убрать нумерацию', fn: 'fmt_denumber' },
      ],
    };

    let currentFmtCat = 'spaces';

    function setFmtCat(cat, btn) {
      currentFmtCat = cat;
      document.querySelectorAll('.fmt-cat').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderFmtBtns();
    }

    function renderFmtBtns() {
      const wrap = document.getElementById('fmt-btns');
      wrap.innerHTML = '';
      FMT_CATS[currentFmtCat].forEach(({ label, fn }) => {
        const b = document.createElement('button');
        b.className = 'f-btn';
        b.textContent = label;
        b.onclick = () => window[fn]();
        wrap.appendChild(b);
      });
    }


    function fmt_spaces() { setValue(ed.value.replace(/[ \t]{2,}/g, ' ')); toast('Двойные пробелы убраны'); }
    function fmt_lines() { setValue(ed.value.replace(/\n{3,}/g, '\n\n')); toast('Лишние строки удалены'); }
    function fmt_trim() { setValue(ed.value.split('\n').map(l => l.trim()).join('\n')); toast('Края строк обрезаны'); }
    function fmt_upper() { setValue(ed.value.toUpperCase()); toast('Текст — ВЕРХНИЙ регистр'); }
    function fmt_lower() { setValue(ed.value.toLowerCase()); toast('Текст — нижний регистр'); }

    // Каждое слово с заглавной
    function fmt_title() {
      setValue(ed.value.replace(/\S+/g, w => w[0].toUpperCase() + w.slice(1).toLowerCase()));
      toast('Аа — каждое слово с заглавной');
    }

    // Заглавная после . ! ?
    function fmt_sentence() {
      const t = ed.value.toLowerCase().replace(/(^|[.!?]\s+)([а-яёa-z])/giu,
        (_, pre, ch) => pre + ch.toUpperCase());
      setValue(t);
      toast('Аа — заглавная в начале предложений');
    }

    // Убрать пробел ПЕРЕД знаком
    function fmt_space_before() {
      setValue(ed.value.replace(/\s+([,\.!?:;])/g, '$1'));
      toast('Пробелы перед знаками убраны');
    }

    // Добавить пробел ПОСЛЕ знака если его нет
    function fmt_space_after() {
      setValue(ed.value.replace(/([,\.!?:;])([^\s\n\d"'»)\]\}])/g, '$1 $2'));
      toast('Пробелы после знаков добавлены');
    }

    // Убрать все знаки препинания
    function fmt_remove_punct() {
      const before = ed.value;
      const after = before.replace(/[.,!?;:'"«»\-—–()\[\]{}\u2018\u2019\u201C\u201D]/g, '');
      const cnt = before.length - after.length;
      setValue(after);
      toast(cnt > 0 ? `Убрано ${cnt} знаков препинания` : 'Знаков препинания не найдено');
    }

    // Убрать скобки и их содержимое
    function fmt_remove_brackets() {
      const before = ed.value;
      // Круглые, квадратные, фигурные — с содержимым
      let after = before;
      after = after.replace(/\([^)]*\)/g, '');
      after = after.replace(/\[[^\]]*\]/g, '');
      after = after.replace(/\{[^}]*\}/g, '');
      // Убираем двойные пробелы после удаления
      after = after.replace(/[ \t]{2,}/g, ' ').replace(/^ +| +$/gm, '');
      const cnt = before.length - after.length;
      setValue(after);
      toast(cnt > 0 ? `Скобки с содержимым убраны` : 'Скобок не найдено');
    }

    // Заменить знаки препинания на другой символ
    function fmt_replace_punct() {
      const repl = prompt('На что заменить знаки препинания? (оставьте пустым чтобы убрать)', '');
      if (repl === null) return; // отмена
      const before = ed.value;
      const after = before.replace(/[.,!?;:'"«»\-—–()\[\]{}\u2018\u2019\u201C\u201D]/g, repl);
      const cnt = (before.match(/[.,!?;:'"«»\-—–()\[\]{}\u2018\u2019\u201C\u201D]/g) || []).length;
      setValue(after);
      toast(cnt > 0 ? `Заменено ${cnt} знаков` : 'Знаков препинания не найдено');
    }

    // Неразрывные пробелы → обычные
    function fmt_nbsp() {
      const before = ed.value;
      const after = before.replace(/\u00A0/g, ' ');
      const cnt = (before.match(/\u00A0/g) || []).length;
      setValue(after);
      toast(cnt > 0 ? `Заменено ${cnt} неразрывных пробелов` : 'Неразрывных пробелов не найдено');
    }

    // Весь текст в одну строку
    function fmt_oneline() {
      setValue(ed.value.replace(/\n+/g, ' ').replace(/\s{2,}/g, ' ').trim());
      toast('Текст собран в одну строку');
    }

    // Каждое предложение с новой строки
    function fmt_sentlines() {
      setValue(ed.value.replace(/([.!?])\s+/g, '$1\n').trim());
      toast('Каждое предложение на новой строке');
    }

    // Убрать нумерацию строк (1. 2. 3. и т.д.)
    function fmt_denumber() {
      setValue(ed.value.replace(/^\s*\d+[\.\)]\s*/gm, ''));
      toast('Нумерация строк удалена');
    }

    // ══════════════════════════════════════
    // CLIPBOARD
    // ══════════════════════════════════════
    async function doPaste() {
      closeFileMenu();

      if (navigator.clipboard && location.protocol === 'https:') {
        try {
          const text = await navigator.clipboard.readText();
          setValue(text);
          ed.scrollTop = 0;
          window.scrollTo(0, 0);
          toast(`✓ Вставлено ${text.length} симв.`);
          return;
        } catch { }
      }

      // Fallback: фокус на поле, пользователь вставляет вручную
      ed.focus();
      toast('Нажмите и удерживайте поле → Вставить');
    }

    async function doCopy() {
      const text = ed.value;
      if (!text.trim()) { toast('Нечего копировать'); return; }
      addToSessHist(text); // история сессий

      // Метод 1: современный Clipboard API (работает на https://)
      if (navigator.clipboard && location.protocol === 'https:') {
        try {
          await navigator.clipboard.writeText(text);
          toast(`✓ Скопировано ${text.length} симв.`);
          return;
        } catch { }
      }

      // Метод 2: execCommand (работает везде включая file://)
      try {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        const ok = document.execCommand('copy');
        document.body.removeChild(ta);
        if (ok) { toast(`✓ Скопировано ${text.length} симв.`); return; }
      } catch { }

      // Метод 3: выделить текст в поле — пользователь копирует вручную
      ed.focus();
      ed.select();
      toast('Выделено — нажмите Копировать на клавиатуре');
    }

    function doClear() {
      if (!ed.value) return;
      addToSessHist(ed.value); // история сессий
      setValue('');
      currentFileName = null;
      fileHandle = null;
      document.getElementById('file-banner').classList.remove('active');
      toast('Поле очищено');
    }

    // ══════════════════════════════════════
    // FILE OPERATIONS
    // ══════════════════════════════════════
    async function openFile() {
      closeFileMenu();

      // Try modern File System Access API first
      if ('showOpenFilePicker' in window) {
        try {
          const [handle] = await window.showOpenFilePicker({
            types: [{ description: 'Текстовые файлы', accept: { 'text/plain': ['.txt'] } }]
          });
          fileHandle = handle;
          const file = await handle.getFile();
          const text = await file.text();
          currentFileName = file.name;
          setValue(text);
          showFileBanner(file.name);
          toast(`✓ Открыт: ${file.name}`);
          return;
        } catch (e) {
          if (e.name !== 'AbortError') {
            // Fall through to input fallback
          } else return;
        }
      }

      // Fallback: classic file input
      document.getElementById('file-input').click();
    }

    document.getElementById('file-input').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const text = await file.text();
      currentFileName = file.name;
      fileHandle = null;
      setValue(text);
      showFileBanner(file.name);
      toast(`✓ Открыт: ${file.name}`);
      e.target.value = '';
    });

    async function saveFile() {
      closeFileMenu();
      const text = applyRemovals(ed.value);
      if (!text.trim()) { toast('Нечего сохранять'); return; }

      const fname = currentFileName || 'форматированный.txt';

      // Try File System Access API (save to same file or pick new)
      if ('showSaveFilePicker' in window) {
        try {
          const handle = fileHandle || await window.showSaveFilePicker({
            suggestedName: fname,
            types: [{ description: 'Текстовый файл', accept: { 'text/plain': ['.txt'] } }]
          });
          fileHandle = handle;
          const writable = await handle.createWritable();
          await writable.write(text);
          await writable.close();
          currentFileName = handle.name;
          showFileBanner(handle.name);
          toast(`✓ Сохранено: ${handle.name}`);
          return;
        } catch (e) {
          if (e.name === 'AbortError') return;
        }
      }

      // Fallback: download
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = fname;
      a.click();
      URL.revokeObjectURL(url);
      toast(`✓ Скачан: ${fname}`);
    }

    function showFileBanner(name) {
      document.getElementById('file-name').textContent = name;
      document.getElementById('file-banner').classList.add('active');
    }

    function closeFile() {
      currentFileName = null;
      fileHandle = null;
      document.getElementById('file-banner').classList.remove('active');
    }

    // ══════════════════════════════════════
    // FILE MENU SHEET
    // ══════════════════════════════════════
    function openFileMenu() {
      document.getElementById('file-menu').classList.add('open');
      document.getElementById('fm-overlay').classList.add('active');
    }
    function closeFileMenu() {
      document.getElementById('file-menu').classList.remove('open');
      document.getElementById('fm-overlay').classList.remove('active');
    }

    // ══════════════════════════════════════
    // TOAST
    // ══════════════════════════════════════
    let toastTimer;
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
    }

    // ══════════════════════════════════════
    // PWA INSTALL
    // ══════════════════════════════════════
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('install-btn').classList.add('visible');
    });

    document.getElementById('install-btn').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        document.getElementById('install-btn').classList.remove('visible');
        toast('✓ Приложение установлено!');
      }
      deferredPrompt = null;
    });

    window.addEventListener('appinstalled', () => {
      document.getElementById('install-btn').classList.remove('visible');
    });

    // ══════════════════════════════════════
    // NOTES & SESSION HISTORY (localStorage)
    // ══════════════════════════════════════

    const LS_NOTES = 'edit_notes_v1';
    const LS_HIST  = 'edit_session_hist_v1';
    const MAX_SESS = 30; // максимум записей в истории сессий

    function loadNotes() {
      try { return JSON.parse(localStorage.getItem(LS_NOTES)) || []; } catch { return []; }
    }
    function saveNotes(arr) {
      localStorage.setItem(LS_NOTES, JSON.stringify(arr));
    }
    function loadSessHist() {
      try { return JSON.parse(localStorage.getItem(LS_HIST)) || []; } catch { return []; }
    }
    function saveSessHist(arr) {
      localStorage.setItem(LS_HIST, JSON.stringify(arr));
    }

    // Форматирование даты
    function fmtDate(ts) {
      const d = new Date(ts);
      const pad = n => String(n).padStart(2, '0');
      return `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    // Авто-имя по дате
    function autoName() {
      const d = new Date();
      const pad = n => String(n).padStart(2, '0');
      return `${pad(d.getDate())}.${pad(d.getMonth()+1)} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    // Сохранить заметку вручную
    function saveNote() {
      const text = ed.value.trim();
      if (!text) { toast('Нет текста для сохранения'); return; }
      // Читаем имя из sidebar (десктоп) или sheet (мобайл)
      const nameInput = document.getElementById('nm-name') || document.getElementById('nm-sheet-name');
      const sheetInput = document.getElementById('nm-sheet-name');
      const name = nameInput.value.trim() || autoName();
      const notes = loadNotes();
      notes.unshift({ id: Date.now(), name, text, ts: Date.now() });
      saveNotes(notes);
      if (nameInput) nameInput.value = '';
      if (sheetInput && sheetInput !== nameInput) sheetInput.value = '';
      toast(`✓ Заметка «${name}» сохранена`);
      renderSavedList();
    }

    // Добавить запись в историю сессий (вызывается при Стереть/Копировать)
    function addToSessHist(text) {
      if (!text || text.trim().length < 20) return;
      const hist = loadSessHist();
      // Не дублируем если тот же текст что и последний
      if (hist.length > 0 && hist[0].text === text) return;
      hist.unshift({ id: Date.now(), text, ts: Date.now() });
      if (hist.length > MAX_SESS) hist.length = MAX_SESS;
      saveSessHist(hist);
    }

    // Восстановить текст из заметки/истории
    function restoreText(text) {
      setValue(text);
      closeNotesMenu();
      toast('✓ Текст восстановлен');
    }

    // Удалить заметку
    function deleteNote(id) {
      const notes = loadNotes().filter(n => n.id !== id);
      saveNotes(notes);
      renderSavedList();
      toast('Заметка удалена');
    }

    // Удалить запись из истории
    function deleteSessEntry(id) {
      const hist = loadSessHist().filter(n => n.id !== id);
      saveSessHist(hist);
      renderHistList();
      toast('Запись удалена');
    }

    // Очистить все заметки
    function clearAllNotes() {
      if (!confirm('Удалить все сохранённые заметки?')) return;
      saveNotes([]);
      renderSavedList();
      toast('Все заметки удалены');
    }

    // Очистить историю сессий
    function clearHistory() {
      if (!confirm('Очистить всю историю сессий?')) return;
      saveSessHist([]);
      renderHistList();
      toast('История очищена');
    }

    // Экспорт JSON
    function exportJSON() {
      const data = {
        exported: new Date().toISOString(),
        notes: loadNotes(),
        sessionHistory: loadSessHist()
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `edit-notes-${autoName().replace(/[: ]/g,'-')}.json`;
      a.click();
      URL.revokeObjectURL(url);
      toast('✓ JSON экспортирован');
    }

    // Рендер списка заметок (sidebar + sheet)
    const _noteTexts = new Map(); // id → text для безопасного onclick
    function renderSavedList() {
      const containers = ['nm-saved-list', 'nm-sheet-saved-list'].map(id => document.getElementById(id)).filter(Boolean);
      const notes = loadNotes();
      containers.forEach(list => {
        list.innerHTML = '';
        if (!notes.length) {
          list.innerHTML = '<div class="nm-empty">Нет сохранённых заметок</div>';
          return;
        }
        notes.forEach(n => {
          _noteTexts.set('note_' + n.id, n.text);
          const item = document.createElement('div');
          item.className = 'nm-item';
          const body = document.createElement('div');
          body.className = 'nm-item-body';
          body.innerHTML = `
            <div class="nm-item-name">${escHtml(n.name)}</div>
            <div class="nm-item-meta">${fmtDate(n.ts)} · ${n.text.length} симв.</div>
            <div class="nm-item-preview">${escHtml(n.text.slice(0,80).replace(/\n/g,' '))}…</div>
          `;
          body.addEventListener('click', () => restoreText(n.text));
          const del = document.createElement('button');
          del.className = 'nm-del';
          del.textContent = '×';
          del.setAttribute('aria-label', 'Удалить');
          del.addEventListener('click', (e) => { e.stopPropagation(); deleteNote(n.id); });
          item.appendChild(body);
          item.appendChild(del);
          list.appendChild(item);
        });
      });
    }

    // Рендер истории сессий (sidebar + sheet)
    function renderHistList() {
      const containers = ['nm-hist-list', 'nm-sheet-hist-list'].map(id => document.getElementById(id)).filter(Boolean);
      const hist = loadSessHist();
      containers.forEach(list => {
        list.innerHTML = '';
        if (!hist.length) {
          list.innerHTML = '<div class="nm-empty">История пуста.<br>Появится автоматически при копировании или очистке текста.</div>';
          return;
        }
        hist.forEach(n => {
          const item = document.createElement('div');
          item.className = 'nm-item';
          const body = document.createElement('div');
          body.className = 'nm-item-body';
          body.innerHTML = `
            <div class="nm-item-meta">${fmtDate(n.ts)} · ${n.text.length} симв.</div>
            <div class="nm-item-preview">${escHtml(n.text.slice(0,100).replace(/\n/g,' '))}…</div>
          `;
          body.addEventListener('click', () => restoreText(n.text));
          const del = document.createElement('button');
          del.className = 'nm-del';
          del.textContent = '×';
          del.setAttribute('aria-label', 'Удалить');
          del.addEventListener('click', (e) => { e.stopPropagation(); deleteSessEntry(n.id); });
          item.appendChild(body);
          item.appendChild(del);
          list.appendChild(item);
        });
      });
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Переключение вкладок в notes sheet (mobile)
    let currentNmTab = 'saved';
    function switchNmTab(tab) {
      currentNmTab = tab;
      document.getElementById('nm-tab-saved').classList.toggle('active', tab === 'saved');
      document.getElementById('nm-tab-hist').classList.toggle('active', tab === 'hist');
      const sp = document.getElementById('nm-sheet-saved-panel');
      const hp = document.getElementById('nm-sheet-hist-panel');
      sp.style.display = tab === 'saved' ? '' : 'none';
      hp.style.display = tab === 'hist' ? 'flex' : 'none';
      if (tab === 'hist') { hp.style.flexDirection = 'column'; hp.style.flex = '1'; hp.style.minHeight = '0'; hp.style.gap = '10px'; }
      if (tab === 'saved') renderSavedList();
      else renderHistList();
    }

    function openNotesMenu() {
      document.getElementById('notes-menu').classList.add('open');
      document.getElementById('nm-overlay').classList.add('active');
      const ni = document.getElementById('nm-sheet-name');
      if (ni && !ni.value) ni.value = autoName();
      if (currentNmTab === 'saved') renderSavedList();
      else renderHistList();
    }
    function closeNotesMenu() {
      document.getElementById('notes-menu').classList.remove('open');
      document.getElementById('nm-overlay').classList.remove('active');
    }

    // Переключение вкладок в sidebar (desktop)
    let currentSbTab = 'saved';
    function switchSbTab(tab) {
      currentSbTab = tab;
      document.getElementById('sb-tab-saved').classList.toggle('active', tab === 'saved');
      document.getElementById('sb-tab-hist').classList.toggle('active', tab === 'hist');
      const sp = document.getElementById('nm-saved-panel');
      const hp = document.getElementById('nm-hist-panel');
      if (tab === 'saved') {
        sp.style.display = 'flex'; sp.classList.remove('nm-hidden');
        hp.style.display = 'none'; hp.classList.add('nm-hidden');
        renderSavedList();
      } else {
        hp.style.display = 'flex'; hp.classList.remove('nm-hidden');
        sp.style.display = 'none'; sp.classList.add('nm-hidden');
        renderHistList();
      }
    }

    // ══════════════════════════════════════
    // INIT
    // ══════════════════════════════════════
    let edTimer;
    let wasEmpty = true; // отслеживаем — было ли поле пустым

    ed.addEventListener('input', () => {
      // Если вставили в пустое поле — сбрасываем скролл немедленно
      if (wasEmpty && ed.value.length > 0) {
        ed.scrollTop = 0;
        window.scrollTo(0, 0);
        document.documentElement.scrollTop = 0;
      }
      wasEmpty = ed.value.length === 0;

      clearTimeout(edTimer);
      edTimer = setTimeout(() => {
        saveHist(ed.value);
        removedSet.clear();
        render();
      }, 350);
    });

    // Init
    ed.value = '';
    renderFmtBtns();
    render();
    renderSavedList(); // sidebar desktop
    // Авто-имя в sidebar
    const _sbn = document.getElementById('nm-name');
    if (_sbn) _sbn.value = autoName();

    // ══════════════════════════════════════
    // PRESETS & REGEX SYSTEM
    // ══════════════════════════════════════

    const LS_PRESETS = 'edit_presets_v1';
    const LS_REGEX   = 'edit_regex_v1';

    // --- Storage helpers ---
    function loadPresets() { try { return JSON.parse(localStorage.getItem(LS_PRESETS)) || []; } catch { return []; } }
    function savePresets(arr) { localStorage.setItem(LS_PRESETS, JSON.stringify(arr)); }
    function loadRegexList() { try { return JSON.parse(localStorage.getItem(LS_REGEX)) || []; } catch { return []; } }
    function saveRegexList(arr) { localStorage.setItem(LS_REGEX, JSON.stringify(arr)); }

    // --- Pure text transformers for presets (text → text, no side effects) ---
    const FMT_ACTION_MAP = {
      fmt_spaces:        { label: '×2 пробелы',       fn: v => v.replace(/[ \t]{2,}/g, ' ') },
      fmt_nbsp:          { label: 'Неразрывные',       fn: v => v.replace(/\u00A0/g, ' ') },
      fmt_trim:          { label: 'Обрезать края',     fn: v => v.split('\n').map(l => l.trim()).join('\n') },
      fmt_upper:         { label: 'АА ВЕРХНИЙ',        fn: v => v.toUpperCase() },
      fmt_lower:         { label: 'аа нижний',         fn: v => v.toLowerCase() },
      fmt_title:         { label: 'Аа Каждое Слово',   fn: v => v.replace(/\S+/g, w => w[0].toUpperCase() + w.slice(1).toLowerCase()) },
      fmt_sentence:      { label: 'Аа предложения',    fn: v => v.toLowerCase().replace(/(^|[.!?]\s+)([а-яёa-z])/giu, (_, p, c) => p + c.toUpperCase()) },
      fmt_space_before:  { label: 'Пробел до знака',   fn: v => v.replace(/\s+([,\.!?:;])/g, '$1') },
      fmt_space_after:   { label: 'Пробел после знака',fn: v => v.replace(/([,\.!?:;])([^\s\n\d"'»)\]\}])/g, '$1 $2') },
      fmt_remove_punct:  { label: 'Убрать пунктуацию', fn: v => v.replace(/[.,!?;:'"«»\-—–()\[\]{}\u2018\u2019\u201C\u201D]/g, '') },
      fmt_remove_brackets:{ label: 'Убрать ( ) [ ]',   fn: v => v.replace(/\([^)]*\)/g,'').replace(/\[[^\]]*\]/g,'').replace(/\{[^}]*\}/g,'').replace(/[ \t]{2,}/g,' ').replace(/^ +| +$/gm,'') },
      fmt_lines:         { label: 'Лишние строки',     fn: v => v.replace(/\n{3,}/g, '\n\n') },
      fmt_oneline:       { label: 'Одна строка',       fn: v => v.replace(/\n+/g, ' ').replace(/\s{2,}/g, ' ').trim() },
      fmt_sentlines:     { label: 'По предложениям',   fn: v => v.replace(/([.!?])\s+/g, '$1\n').trim() },
      fmt_denumber:      { label: 'Убрать нумерацию',  fn: v => v.replace(/^\s*\d+[\.]\s*/gm, '') },
    };

    // --- Sheet open/close ---
    let psCurrentTab = 'presets';

    function openPresetsSheet() {
      document.getElementById('ps-overlay').style.display = 'block';
      const sheet = document.getElementById('presets-sheet');
      sheet.classList.add('open');
      renderPresetsTab();
      renderRegexTab();
    }
    function closePresetsSheet() {
      document.getElementById('ps-overlay').style.display = 'none';
      document.getElementById('presets-sheet').classList.remove('open');
    }
    function switchPsTab(tab) {
      psCurrentTab = tab;
      document.getElementById('ps-tab-presets').classList.toggle('active', tab === 'presets');
      document.getElementById('ps-tab-regex').classList.toggle('active', tab === 'regex');
      document.getElementById('ps-body-presets').style.display = tab === 'presets' ? 'flex' : 'none';
      document.getElementById('ps-body-regex').style.display  = tab === 'regex'   ? 'flex' : 'none';
      // swap footer Add button behaviour
      document.getElementById('ps-add-btn').onclick = tab === 'presets'
        ? () => openPresetModal(null)
        : () => openRegexModal(null);
    }

    // ── RENDER PRESETS TAB ──
    function renderPresetsTab() {
      const list = loadPresets();
      const el = document.getElementById('ps-body-presets');
      if (!list.length) {
        el.innerHTML = '<div class="ps-empty">Нет пресетов.<br>Нажми «+ Добавить» чтобы создать.</div>';
        return;
      }
      el.innerHTML = '';
      list.forEach((p, i) => {
        const card = document.createElement('div');
        card.className = 'ps-card';

        const stepLabels = (p.steps || []).map(id => {
          if (id.startsWith('__sym__')) {
            const syms = id.replace('__sym__','').split('\x00').filter(Boolean);
            return '🔣 ' + syms.map(s => s === '__emoji__' ? '😀' : s).join(' ');
          }
          if (id.startsWith('__rx__')) {
            const rxList = loadRegexList();
            const rx = rxList.find(r => r.id === id.replace('__rx__',''));
            return rx ? rx.name : id;
          }
          return FMT_ACTION_MAP[id] ? FMT_ACTION_MAP[id].label : id;
        });

        card.innerHTML = `
          <div class="ps-card-row">
            <span class="ps-card-name">${escHtml(p.name)}</span>
            <div class="ps-card-btns">
              <button class="ps-run-btn" onclick="runPreset(${i})">▶ Запустить</button>
              <button class="ps-icon-btn" onclick="openPresetModal(${i})" title="Редактировать">✎</button>
              <button class="ps-icon-btn danger" onclick="deletePreset(${i})" title="Удалить">✕</button>
            </div>
          </div>
          <div class="ps-steps-preview">${stepLabels.map(l => `<span class="ps-step-chip">${escHtml(l)}</span>`).join('')}</div>
        `;
        el.appendChild(card);
      });
    }

    // ── RENDER REGEX TAB ──
    function renderRegexTab() {
      const list = loadRegexList();
      const el = document.getElementById('ps-body-regex');
      if (!list.length) {
        el.innerHTML = '<div class="ps-empty">Нет кастомных регулярок.<br>Нажми «+ Добавить» чтобы создать.</div>';
        return;
      }
      el.innerHTML = '';
      list.forEach((r, i) => {
        const card = document.createElement('div');
        card.className = 'ps-card';
        card.innerHTML = `
          <div class="ps-card-row">
            <span class="ps-card-name">${escHtml(r.name)}</span>
            <div class="ps-card-btns">
              <button class="ps-run-btn" onclick="runRegex(${i})">▶ Применить</button>
              <button class="ps-icon-btn" onclick="openRegexModal(${i})" title="Редактировать">✎</button>
              <button class="ps-icon-btn danger" onclick="deleteRegex(${i})" title="Удалить">✕</button>
            </div>
          </div>
          <div class="ps-regex-preview">/${escHtml(r.pattern)}/${escHtml(r.flags)} → «${escHtml(r.replace || '')}»</div>
        `;
        el.appendChild(card);
      });
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── RUN PRESET ──
    function runPreset(idx) {
      const list = loadPresets();
      const p = list[idx];
      if (!p) return;
      let v = ed.value;
      let applied = 0;
      (p.steps || []).forEach(id => {
        if (id.startsWith('__rx__')) {
          const rxId = id.replace('__rx__','');
          const rx = loadRegexList().find(r => r.id === rxId);
          if (rx) {
            try {
              const re = new RegExp(rx.pattern, rx.flags);
              v = v.replace(re, rx.replace || '');
              applied++;
            } catch(e) { toast('Ошибка регулярки: ' + rx.name); }
          }
        } else if (id.startsWith('__sym__')) {
          // Символы из детектора
          const syms = id.replace('__sym__','').split('\x00').filter(Boolean);
          const tmpSet = new Set(syms);
          const hadEmoji = syms.includes('__emoji__');
          if (hadEmoji) tmpSet.delete('__emoji__');
          // применяем через applyRemovals-логику напрямую
          const sorted = [...tmpSet].sort((a,b) => b.length - a.length);
          sorted.forEach(pat => { v = removeExact(v, pat); });
          if (hadEmoji) v = v.replace(EMOJI_RE, '');
          applied++;
        } else {
          const action = FMT_ACTION_MAP[id];
          if (action) { v = action.fn(v); applied++; }
        }
      });
      setValue(v);
      closePresetsSheet();
      toast(`✓ «${p.name}» — ${applied} шаг${applied===1?'':applied<5?'а':'ов'}`);
    }

    // ── RUN SINGLE REGEX ──
    function runRegex(idx) {
      const list = loadRegexList();
      const r = list[idx];
      if (!r) return;
      try {
        const re = new RegExp(r.pattern, r.flags);
        setValue(ed.value.replace(re, r.replace || ''));
        closePresetsSheet();
        toast(`✓ «${r.name}» применена`);
      } catch(e) { toast('Ошибка в регулярке: ' + e.message); }
    }

    // ── DELETE ──
    function deletePreset(idx) {
      const list = loadPresets();
      const name = list[idx].name;
      list.splice(idx, 1);
      savePresets(list);
      renderPresetsTab();
      toast(`Удалён: «${name}»`);
    }
    function deleteRegex(idx) {
      const list = loadRegexList();
      const name = list[idx].name;
      list.splice(idx, 1);
      saveRegexList(list);
      renderRegexTab();
      toast(`Удалена: «${name}»`);
    }

    // ══════════════════════════════════════
    // PRESET MODAL EDITOR
    // ══════════════════════════════════════

    let pmEditIdx = null;  // null = new, number = edit
    let pmSelectedSteps = []; // ordered array of step IDs

    function openPresetModal(idx) {
      pmEditIdx = idx;
      const isEdit = idx !== null;
      document.getElementById('preset-modal-title').textContent = isEdit ? 'Редактировать пресет' : 'Новый пресет';

      const presets = loadPresets();
      if (isEdit && presets[idx]) {
        document.getElementById('pm-name').value = presets[idx].name;
        pmSelectedSteps = [...(presets[idx].steps || [])];
      } else {
        document.getElementById('pm-name').value = '';
        pmSelectedSteps = [];
      }

      buildStepPicker();
      renderStepsOrder();

      document.getElementById('preset-modal-overlay').classList.add('open');
      document.getElementById('preset-modal-box').classList.add('open');
    }

    function closePresetModal() {
      document.getElementById('preset-modal-overlay').classList.remove('open');
      document.getElementById('preset-modal-box').classList.remove('open');
    }

    function buildStepPicker() {
      const picker = document.getElementById('pm-step-picker');
      picker.innerHTML = '';

      // ── Секция: символы из детектора ──
      const symHeader = document.createElement('div');
      symHeader.style.cssText = 'width:100%;font:600 10px var(--sans);color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin:2px 0 4px;';
      symHeader.textContent = 'Символы';
      picker.appendChild(symHeader);

      // Найти какие символы есть в тексте сейчас
      const currentText = ed.value;
      const foundSyms = DICT.filter(pat => currentText.includes(pat));
      const hasEmoji = EMOJI_RE.test(currentText);
      EMOJI_RE.lastIndex = 0;

      // Существующий __sym__ шаг в pmSelectedSteps (если есть)
      const symStepIdx = pmSelectedSteps.findIndex(s => s.startsWith('__sym__'));
      const selectedSyms = symStepIdx !== -1
        ? new Set(pmSelectedSteps[symStepIdx].replace('__sym__','').split('\x00').filter(Boolean))
        : new Set();

      // Показываем все символы DICT + эмодзи
      const allSyms = [...DICT, ...(hasEmoji || selectedSyms.has('__emoji__') ? ['__emoji__'] : [])];
      const displaySyms = allSyms.length ? allSyms : DICT; // если текст пустой — показываем все

      displaySyms.forEach(pat => {
        const isEmoji = pat === '__emoji__';
        const label = isEmoji ? '😀 эмодзи' : pat;
        const inText = isEmoji ? hasEmoji : currentText.includes(pat);
        const chip = document.createElement('button');
        chip.className = 'step-chip' + (selectedSyms.has(pat) ? ' selected' : '');
        chip.textContent = label;
        if (!inText) chip.style.opacity = '0.45'; // не в тексте — затемнить, но не скрыть
        chip.title = inText ? 'Найден в тексте' : 'Не найден в тексте';
        chip.onclick = () => toggleSymStep(pat, chip, selectedSyms, symStepIdx);
        picker.appendChild(chip);
      });

      // ── Секция: fmt-функции ──
      const fmtHeader = document.createElement('div');
      fmtHeader.style.cssText = 'width:100%;font:600 10px var(--sans);color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin:8px 0 4px;';
      fmtHeader.textContent = 'Форматирование';
      picker.appendChild(fmtHeader);

      Object.entries(FMT_ACTION_MAP).forEach(([id, item]) => {
        const chip = document.createElement('button');
        chip.className = 'step-chip' + (pmSelectedSteps.includes(id) ? ' selected' : '');
        chip.textContent = item.label;
        chip.onclick = () => toggleStep(id, chip);
        picker.appendChild(chip);
      });

      // ── Секция: кастомные регулярки ──
      const rxList = loadRegexList();
      if (rxList.length) {
        const rxHeader = document.createElement('div');
        rxHeader.style.cssText = 'width:100%;font:600 10px var(--sans);color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin:8px 0 4px;';
        rxHeader.textContent = 'Регулярки';
        picker.appendChild(rxHeader);
        rxList.forEach(rx => {
          const id = '__rx__' + rx.id;
          const chip = document.createElement('button');
          chip.className = 'step-chip' + (pmSelectedSteps.includes(id) ? ' selected' : '');
          chip.textContent = '/ ' + rx.name;
          chip.onclick = () => toggleStep(id, chip);
          picker.appendChild(chip);
        });
      }
    }

    // Тогл символа — они объединяются в один шаг __sym__
    function toggleSymStep(pat, chip, selectedSyms, symStepIdx) {
      if (selectedSyms.has(pat)) {
        selectedSyms.delete(pat);
        chip.classList.remove('selected');
      } else {
        selectedSyms.add(pat);
        chip.classList.add('selected');
      }
      // Пересобираем единый __sym__ шаг
      const newId = '__sym__' + [...selectedSyms].join('\x00');
      if (symStepIdx !== -1) {
        if (selectedSyms.size === 0) {
          pmSelectedSteps.splice(symStepIdx, 1);
        } else {
          pmSelectedSteps[symStepIdx] = newId;
        }
      } else if (selectedSyms.size > 0) {
        pmSelectedSteps.unshift(newId); // символы — первый шаг
      }
      renderStepsOrder();
    }

    function toggleStep(id, chip) {
      const idx = pmSelectedSteps.indexOf(id);
      if (idx === -1) {
        pmSelectedSteps.push(id);
        chip.classList.add('selected');
      } else {
        pmSelectedSteps.splice(idx, 1);
        chip.classList.remove('selected');
      }
      renderStepsOrder();
    }

    function renderStepsOrder() {
      const el = document.getElementById('pm-steps-order');
      if (!pmSelectedSteps.length) {
        el.innerHTML = '<span style="color:var(--dim);font:400 11px var(--sans);padding:4px 0;">Выбери шаги выше</span>';
        return;
      }
      el.innerHTML = '';
      pmSelectedSteps.forEach((id, i) => {
        let label;
        if (id.startsWith('__sym__')) {
          const syms = id.replace('__sym__','').split('\x00').filter(Boolean);
          label = '🔣 Символы: ' + syms.map(s => s === '__emoji__' ? '😀' : s).join(' ');
        } else if (id.startsWith('__rx__')) {
          const rx = loadRegexList().find(r => r.id === id.replace('__rx__',''));
          label = rx ? ('/ ' + rx.name) : id;
        } else {
          label = FMT_ACTION_MAP[id] ? FMT_ACTION_MAP[id].label : id;
        }
        const row = document.createElement('div');
        row.className = 'sorder-item';
        row.innerHTML = `
          <span class="sorder-drag">⠿</span>
          <span class="sorder-label">${escHtml(label)}</span>
          ${i > 0 ? `<button class="sorder-up" onclick="moveStep(${i},-1)">↑</button>` : '<span style="width:20px"></span>'}
          ${i < pmSelectedSteps.length-1 ? `<button class="sorder-dn" onclick="moveStep(${i},1)">↓</button>` : '<span style="width:20px"></span>'}
          <button class="sorder-del" onclick="removeStep(${i})">✕</button>
        `;
        el.appendChild(row);
      });
    }

    function moveStep(i, dir) {
      const j = i + dir;
      if (j < 0 || j >= pmSelectedSteps.length) return;
      [pmSelectedSteps[i], pmSelectedSteps[j]] = [pmSelectedSteps[j], pmSelectedSteps[i]];
      renderStepsOrder();
    }

    function removeStep(i) {
      pmSelectedSteps.splice(i, 1);
      buildStepPicker(); // пересинхронизирует selected-состояние всех чипов
      renderStepsOrder();
    }

    function savePresetFromModal() {
      const name = document.getElementById('pm-name').value.trim();
      if (!name) { toast('Введи название'); return; }
      if (!pmSelectedSteps.length) { toast('Выбери хотя бы один шаг'); return; }

      const list = loadPresets();
      const entry = { name, steps: [...pmSelectedSteps] };
      if (pmEditIdx !== null) {
        list[pmEditIdx] = entry;
      } else {
        list.push(entry);
      }
      savePresets(list);
      closePresetModal();
      renderPresetsTab();
      toast(pmEditIdx !== null ? `Пресет обновлён` : `Пресет «${name}» сохранён`);
    }

    // ══════════════════════════════════════
    // REGEX MODAL EDITOR
    // ══════════════════════════════════════

    let rmEditIdx = null;

    function openRegexModal(idx) {
      rmEditIdx = idx;
      const isEdit = idx !== null;
      document.getElementById('regex-modal-title').textContent = isEdit ? 'Редактировать регулярку' : 'Новая регулярка';

      const list = loadRegexList();
      if (isEdit && list[idx]) {
        document.getElementById('rm-name').value    = list[idx].name;
        document.getElementById('rm-pattern').value = list[idx].pattern;
        document.getElementById('rm-flags').value   = list[idx].flags;
        document.getElementById('rm-replace').value = list[idx].replace || '';
      } else {
        document.getElementById('rm-name').value    = '';
        document.getElementById('rm-pattern').value = '';
        document.getElementById('rm-flags').value   = 'g';
        document.getElementById('rm-replace').value = '';
      }
      document.getElementById('rm-test-result').textContent = '';

      document.getElementById('regex-modal-overlay').classList.add('open');
      document.getElementById('regex-modal-box').classList.add('open');
    }

    function closeRegexModal() {
      document.getElementById('regex-modal-overlay').classList.remove('open');
      document.getElementById('regex-modal-box').classList.remove('open');
    }

    function testRegex() {
      const pat = document.getElementById('rm-pattern').value;
      const flags = document.getElementById('rm-flags').value;
      const repl = document.getElementById('rm-replace').value;
      const sample = ed.value || 'Тест: (удалить это) и [это тоже] остальное оставить';
      const res = document.getElementById('rm-test-result');
      if (!pat) { res.textContent = '⚠ Введи паттерн'; return; }
      try {
        const re = new RegExp(pat, flags);
        const out = sample.slice(0, 200).replace(re, repl || '');
        res.textContent = '→ ' + out.slice(0, 120) + (out.length > 120 ? '…' : '');
        res.style.color = 'var(--green, #4ade80)';
      } catch(e) {
        res.textContent = '✕ Ошибка: ' + e.message;
        res.style.color = '#f87171';
      }
    }

    function saveRegexFromModal() {
      const name    = document.getElementById('rm-name').value.trim();
      const pattern = document.getElementById('rm-pattern').value.trim();
      const flags   = document.getElementById('rm-flags').value.trim();
      const replace = document.getElementById('rm-replace').value;

      if (!name)    { toast('Введи название'); return; }
      if (!pattern) { toast('Введи паттерн'); return; }
      try { new RegExp(pattern, flags); } catch(e) { toast('Ошибка в RegExp: ' + e.message); return; }

      const list = loadRegexList();
      const entry = { id: rmEditIdx !== null ? list[rmEditIdx].id : Date.now().toString(36), name, pattern, flags, replace };
      if (rmEditIdx !== null) {
        list[rmEditIdx] = entry;
      } else {
        list.push(entry);
      }
      saveRegexList(list);
      closeRegexModal();
      renderRegexTab();
      // refresh preset picker if modal is open
      if (document.getElementById('preset-modal-box').classList.contains('open')) buildStepPicker();
      toast(rmEditIdx !== null ? `Регулярка обновлена` : `«${name}» сохранена`);
    }

    // ══════════════════════════════════════
    // EXPORT / IMPORT
    // ══════════════════════════════════════

    function exportPresetsJSON() {
      const data = {
        presets: loadPresets(),
        regex: loadRegexList()
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'edit-presets.json';
      a.click();
      URL.revokeObjectURL(url);
      toast('Экспортировано');
    }

    function importPresetsJSON(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const data = JSON.parse(e.target.result);
          if (data.presets) savePresets(data.presets);
          if (data.regex)   saveRegexList(data.regex);
          renderPresetsTab();
          renderRegexTab();
          toast(`Импортировано: ${(data.presets||[]).length} пресетов, ${(data.regex||[]).length} регулярок`);
        } catch(err) {
          toast('Ошибка импорта: ' + err.message);
        }
        input.value = '';
      };
      reader.readAsText(file);
    }
  </script>
</body>

</html>
