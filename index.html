<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="description" content="PWA-приложение для быстрой очистки и форматирования текста. Работает офлайн.">
  <meta name="theme-color" content="#0b0f1a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="E-dit">
  <title>E-dit</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32x32.png">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Geologica:wght@400;600;700&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --bg: #0b0f1a;
      --s1: #111827;
      --s2: #1a2235;
      --s3: #1e2d47;
      --b1: #1f3054;
      --b2: #2a4070;
      --accent: #3b82f6;
      --accent-d: #2563eb;
      --indigo: #6366f1;
      --text: #c9d8f0;
      --dim: #6b8aad;
      --muted: #3d5475;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --sans: 'Geologica', sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --safe-t: env(safe-area-inset-top, 0px);
      --safe-b: env(safe-area-inset-bottom, 0px);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    button {
      touch-action: manipulation;
    }

    html {
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      position: fixed;
      width: 100%;
      min-height: 100dvh;
    }

    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100dvh;
      min-height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background-color: var(--bg);
      color: #fff;
      font-family: 'Geologica', sans-serif;
      contain: strict;
    }

    /* ── HEADER ─────────────────────────── */
    .hdr {
      flex-shrink: 0;
      background: var(--s1);
      border-bottom: 1px solid var(--b1);
      padding: 10px 14px;
      padding-top: calc(10px + var(--safe-t));
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .hdr-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .logo-mark {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: linear-gradient(135deg, var(--accent), var(--indigo));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      box-shadow: 0 0 12px rgba(59, 130, 246, 0.35);
    }

    .install-btn {
      margin-left: auto;
      display: none;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 7px;
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.4);
      color: var(--accent);
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .05em;
      cursor: pointer;
      text-transform: uppercase;
    }

    .install-btn.visible {
      display: flex;
    }

    .install-btn:active {
      background: rgba(59, 130, 246, 0.25);
    }

    .file-hdr-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 11px;
      border-radius: 7px;
      background: var(--s2);
      border: 1px solid var(--b1);
      color: var(--dim);
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .04em;
    }

    /* ── PRESETS HEADER BUTTON ── */
    .presets-hdr-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      background: rgba(99,102,241,.15);
      border: 1px solid rgba(99,102,241,.3);
      border-radius: 8px;
      color: var(--indigo);
      font: 500 11px var(--sans);
      cursor: pointer;
      transition: background .15s, border-color .15s;
      white-space: nowrap;
    }
    .presets-hdr-btn:active {
      background: rgba(99,102,241,.28);
    }

    /* ── PRESETS SHEET ── */
    .presets-sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--s1);
      border-top: 1px solid var(--b1);
      border-radius: 16px 16px 0 0;
      padding: 0 0 env(safe-area-inset-bottom,0px);
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      z-index: 200;
      transform: translateY(100%);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
    }
    .presets-sheet.open { transform: translateY(0); }

    .ps-handle {
      width: 36px; height: 4px;
      background: var(--muted);
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
    }
    .ps-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px 10px;
      flex-shrink: 0;
    }
    .ps-title {
      font: 600 14px var(--sans);
      color: var(--text);
    }
    .ps-tabs {
      display: flex;
      gap: 6px;
      padding: 0 16px 10px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--b1);
    }
    .ps-tab {
      padding: 5px 14px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--dim);
      font: 500 12px var(--sans);
      cursor: pointer;
      transition: all .15s;
    }
    .ps-tab.active {
      background: rgba(99,102,241,.15);
      border-color: rgba(99,102,241,.35);
      color: var(--indigo);
    }

    /* ── PRESETS LIST ── */
    .ps-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .ps-empty {
      color: var(--dim);
      font: 400 12px var(--sans);
      text-align: center;
      padding: 24px 0;
    }
    .ps-card {
      background: var(--s2);
      border: 1px solid var(--b1);
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .ps-card-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .ps-card-name {
      font: 600 13px var(--sans);
      color: var(--text);
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ps-card-btns {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .ps-run-btn {
      padding: 4px 12px;
      background: rgba(99,102,241,.18);
      border: 1px solid rgba(99,102,241,.35);
      border-radius: 7px;
      color: var(--indigo);
      font: 600 11px var(--sans);
      cursor: pointer;
      transition: background .15s;
    }
    .ps-run-btn:active { background: rgba(99,102,241,.35); }
    .ps-icon-btn {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      background: transparent;
      border: 1px solid var(--b2);
      border-radius: 7px;
      color: var(--dim);
      cursor: pointer;
      font-size: 13px;
      transition: background .15s, color .15s;
    }
    .ps-icon-btn:active { background: var(--s3); color: var(--text); }
    .ps-icon-btn.danger { color: #f87171; border-color: rgba(239,68,68,.2); }
    .ps-icon-btn.danger:active { background: rgba(239,68,68,.1); }
    .ps-steps-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .ps-step-chip {
      font: 400 10px var(--mono);
      color: var(--dim);
      background: var(--s3);
      border-radius: 4px;
      padding: 2px 6px;
    }
    .ps-regex-preview {
      font: 400 10px var(--mono);
      color: var(--dim);
      background: var(--s3);
      border-radius: 4px;
      padding: 3px 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── PRESETS FOOTER ── */
    .ps-footer {
      display: flex;
      gap: 8px;
      padding: 10px 14px;
      border-top: 1px solid var(--b1);
      flex-shrink: 0;
    }
    .ps-foot-btn {
      flex: 1;
      padding: 8px;
      border-radius: 9px;
      border: 1px solid var(--b2);
      background: transparent;
      color: var(--dim);
      font: 500 11px var(--sans);
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .ps-foot-btn:active { background: var(--s3); color: var(--text); }
    .ps-foot-btn.accent {
      background: rgba(99,102,241,.15);
      border-color: rgba(99,102,241,.35);
      color: var(--indigo);
    }
    .ps-foot-btn.accent:active { background: rgba(99,102,241,.3); }

    /* ── MODAL EDITOR ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 300;
      display: none;
    }
    .modal-overlay.open { display: block; }
    .modal-box {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--s1);
      border-top: 1px solid var(--b1);
      border-radius: 16px 16px 0 0;
      padding: 0 0 env(safe-area-inset-bottom,12px);
      max-height: 92vh;
      display: flex;
      flex-direction: column;
      z-index: 301;
      transform: translateY(100%);
      transition: transform .25s cubic-bezier(.4,0,.2,1);
    }
    .modal-box.open { transform: translateY(0); }
    .modal-handle {
      width: 36px; height: 4px;
      background: var(--muted);
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
    }
    .modal-title {
      font: 600 14px var(--sans);
      color: var(--text);
      padding: 12px 16px 10px;
      flex-shrink: 0;
    }
    .modal-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 0 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .modal-label {
      font: 600 11px var(--sans);
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 4px;
    }
    .modal-input {
      width: 100%;
      background: var(--s2);
      border: 1px solid var(--b2);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text);
      font: 400 13px var(--mono);
      outline: none;
      transition: border-color .15s;
    }
    .modal-input:focus { border-color: var(--indigo); }
    .modal-input.small { font-size: 12px; }

    /* Step picker for preset editor */
    .step-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .step-chip {
      padding: 5px 11px;
      border-radius: 7px;
      border: 1px solid var(--b2);
      background: var(--s2);
      color: var(--dim);
      font: 400 11px var(--sans);
      cursor: pointer;
      transition: all .15s;
      user-select: none;
    }
    .step-chip.selected {
      background: rgba(99,102,241,.2);
      border-color: rgba(99,102,241,.5);
      color: var(--indigo);
    }
    .step-chip:active { opacity: .75; }

    /* Ordered steps list */
    .steps-order {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-height: 32px;
    }
    .sorder-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--s3);
      border-radius: 7px;
      padding: 6px 10px;
    }
    .sorder-drag { color: var(--muted); font-size: 13px; cursor: grab; }
    .sorder-label { font: 400 12px var(--sans); color: var(--text); flex: 1; }
    .sorder-del { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 14px; padding: 0 2px; }
    .sorder-up, .sorder-dn {
      background: none; border: none; color: var(--dim);
      cursor: pointer; font-size: 13px; padding: 0 2px;
    }

    .modal-footer {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      border-top: 1px solid var(--b1);
      flex-shrink: 0;
    }
    .modal-btn {
      flex: 1;
      padding: 10px;
      border-radius: 9px;
      border: 1px solid var(--b2);
      background: transparent;
      color: var(--dim);
      font: 600 12px var(--sans);
      cursor: pointer;
      transition: all .15s;
    }
    .modal-btn.accent {
      background: rgba(99,102,241,.18);
      border-color: rgba(99,102,241,.4);
      color: var(--indigo);
    }
    .modal-btn.accent:active { background: rgba(99,102,241,.35); }
    .modal-btn:active { background: var(--s3); color: var(--text); }

    .file-hdr-btn:active {
      background: var(--s3);
      color: var(--text);
    }

    .stats-row {
      display: flex;
      gap: 6px;
      margin-left: auto;
    }

    .chip {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      background: var(--s2);
      border: 1px solid var(--b1);
      border-radius: 5px;
      padding: 2px 8px;
    }

    .chip b {
      color: var(--dim);
      font-weight: 500;
    }

    /* FORMAT — категории + кнопки */
    .fmt-cats {
      display: flex;
      gap: 5px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .fmt-cats::-webkit-scrollbar {
      display: none;
    }

    .fmt-cat {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--b1);
      background: var(--s2);
      color: var(--muted);
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }

    .fmt-cat.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .fmt-cat:active {
      opacity: .8;
    }

    .fmt-btns {
      display: flex;
      gap: 5px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 1px;
    }

    .fmt-btns::-webkit-scrollbar {
      display: none;
    }

    .f-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
      border-radius: 9px;
      background: var(--s2);
      border: 1px solid var(--b1);
      color: var(--dim);
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all .12s;
      min-height: 38px;
    }

    .f-btn:active {
      background: var(--s3);
      border-color: var(--b2);
      color: var(--text);
      transform: scale(.97);
    }

    /* ── SYMBOLS ─────────────────────────── */
    .sym-bar {
      flex-shrink: 0;
      background: var(--s1);
      border-bottom: 1px solid var(--b1);
      padding: 8px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .sym-head {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
    }

    .sym-badge {
      font-family: var(--mono);
      font-size: 10px;
      background: var(--s2);
      border: 1px solid var(--b2);
      border-radius: 4px;
      padding: 1px 6px;
      color: var(--dim);
    }

    /* Tab switcher — full width */
    .sym-tabs {
      display: flex;
      gap: 0;
      background: var(--s2);
      border: 1px solid var(--b1);
      border-radius: 10px;
      padding: 3px;
      width: 100%;
    }

    .sym-tab {
      flex: 1;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 700;
      padding: 8px 0;
      border-radius: 7px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
      letter-spacing: .03em;
    }

    .sym-tab.active {
      background: var(--s3);
      border: 1px solid var(--b2);
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0, 0, 0, .2);
    }

    .sym-tab:active {
      opacity: .8;
    }

    .sym-scroll {
      display: flex;
      gap: 5px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      min-height: 34px;
      align-items: center;
    }

    .sym-scroll::-webkit-scrollbar {
      display: none;
    }

    .s-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      border-radius: 7px;
      background: var(--s2);
      border: 1px solid var(--b2);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      cursor: pointer;
      min-height: 34px;
      transition: all .12s;
    }

    .s-btn:active {
      transform: scale(.93);
    }

    .s-btn.gone {
      text-decoration: line-through;
      color: var(--muted);
      border-color: var(--b1);
      background: var(--s1);
      opacity: .6;
    }

    .s-btn.gone:active {
      border-color: rgba(34, 197, 94, .4);
      color: var(--green);
      opacity: 1;
    }

    .s-btn.emoji-btn {
      font-size: 16px;
    }

    .s-n {
      font-size: 9px;
      color: var(--muted);
      background: var(--s3);
      border-radius: 3px;
      padding: 1px 4px;
      font-family: var(--mono);
    }

    .sym-empty {
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
    }

    /* ── REPLACE PANEL ───────────────────── */
    .replace-panel {
      display: none;
      flex-direction: column;
      gap: 8px;
    }

    .replace-panel.active {
      display: flex;
    }

    .rp-field {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--s2);
      border: 1px solid var(--b2);
      border-radius: 10px;
      padding: 10px 14px;
      width: 100%;
    }

    .rp-field input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 15px;
      width: 100%;
      caret-color: var(--accent);
    }

    .rp-field input::placeholder {
      color: var(--muted);
      font-size: 13px;
      font-family: var(--sans);
    }

    .rp-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      white-space: nowrap;
      width: 28px;
      flex-shrink: 0;
    }

    .rp-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .rp-pair-hint {
      font-size: 11px;
      color: var(--accent);
      opacity: 0;
      transition: opacity .2s;
      padding: 0 2px;
    }

    .rp-pair-hint.visible {
      opacity: 1;
    }

    .rp-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 11px 0;
      border-radius: 10px;
      background: var(--accent);
      border: none;
      color: #fff;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      flex: 1;
      transition: all .12s;
    }

    .rp-btn:active {
      background: var(--accent-d);
      transform: scale(.98);
    }

    .rp-btn.clear-btn {
      background: transparent;
      border: 1px solid var(--b2);
      color: var(--dim);
      flex: 0 0 44px;
      font-size: 18px;
      padding: 11px 0;
    }

    .rp-btn.clear-btn:active {
      background: var(--s3);
    }

    /* ── CONTENT ROW ────────────────────── */
    .content-row {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .main-col {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Sidebar — скрыт на мобайле */
    .notes-sidebar {
      display: none;
    }

    /* ── EDITOR ─────────────────────────── */
    .editor-wrap {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
      height: 0;
    }

    textarea {
      flex: 1;
      width: 100%;
      height: 100%;
      min-height: 0;
      background: var(--s2);
      color: var(--text);
      border: none;
      outline: none;
      resize: none;
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.75;
      padding: 14px 16px;
      caret-color: var(--accent);
      -webkit-appearance: none;
      user-select: text;
      -webkit-user-select: text;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      contain: layout style paint;
    }

    textarea::placeholder {
      color: var(--muted);
      font-family: var(--sans);
      font-size: 13px;
    }

    /* Diff pill */
    .diff-pill {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(11, 15, 26, .88);
      border: 1px solid var(--b2);
      border-radius: 20px;
      padding: 3px 10px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
      pointer-events: none;
      display: none;
      backdrop-filter: blur(6px);
      z-index: 5;
    }

    .diff-pill.pos {
      color: #4ade80;
      border-color: rgba(74, 222, 128, .3);
    }

    .diff-pill.neg {
      color: #f87171;
      border-color: rgba(248, 113, 113, .3);
    }

    /* File mode banner */
    .file-banner {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: rgba(59, 130, 246, .1);
      border-bottom: 1px solid rgba(59, 130, 246, .25);
      font-size: 11px;
      color: var(--accent);
      flex-shrink: 0;
      contain: content;
    }

    .file-banner.active {
      display: flex;
    }

    .file-name {
      font-family: var(--mono);
      font-weight: 600;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-close {
      cursor: pointer;
      opacity: .6;
      font-size: 16px;
      line-height: 1;
    }

    .file-close:hover {
      opacity: 1;
    }

    /* ── BOTTOM BAR ─────────────────────── */
    .btm {
      flex-shrink: 0;
      background: var(--s1);
      border-top: 1px solid var(--b1);
      padding: 8px 10px;
      padding-bottom: calc(8px + var(--safe-b));
      display: grid;
      grid-template-columns: 1fr 1fr 1.6fr 1.6fr 1fr;
      gap: 6px;
      box-shadow: 0 -10px 40px rgba(0, 0, 0, .35);
    }

    .b-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 8px 4px;
      border-radius: 11px;
      background: var(--s2);
      border: 1px solid var(--b1);
      color: var(--dim);
      font-family: var(--sans);
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .12s;
      min-height: 56px;
    }

    .b-btn:active {
      transform: scale(.94);
    }

    .b-btn.green {
      color: #4ade80;
      border-color: rgba(74, 222, 128, .25);
    }

    .b-btn.green:active {
      background: rgba(34, 197, 94, .1);
    }

    .b-btn.blue {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 4px 16px rgba(59, 130, 246, .35);
    }

    .b-btn.blue:active {
      background: var(--accent-d);
    }

    .b-btn.red {
      color: #f87171;
      border-color: rgba(239, 68, 68, .25);
    }

    .b-btn.red:active {
      background: rgba(239, 68, 68, .1);
    }

    /* FILE MENU */
    .file-menu {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--s1);
      border-top: 1px solid var(--b2);
      border-radius: 20px 20px 0 0;
      padding: 16px 16px;
      padding-bottom: calc(20px + var(--safe-b));
      display: flex;
      flex-direction: column;
      gap: 8px;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.32, 1.2, .64, 1);
      z-index: 50;
      box-shadow: 0 -20px 60px rgba(0, 0, 0, .5);
    }

    .file-menu.open {
      transform: translateY(0);
    }

    .fm-handle {
      width: 40px;
      height: 4px;
      background: var(--b2);
      border-radius: 2px;
      margin: 0 auto 10px;
    }

    .fm-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      padding: 0 4px;
    }

    .fm-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--s2);
      border: 1px solid var(--b1);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .12s;
      text-align: left;
    }

    .fm-btn:active {
      background: var(--s3);
    }

    .fm-btn .fm-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .fm-btn .fm-sub {
      font-size: 11px;
      color: var(--dim);
      font-weight: 400;
      display: block;
      margin-top: 2px;
    }

    .fm-btn.open-f .fm-icon {
      background: rgba(59, 130, 246, .2);
      color: var(--accent);
    }

    .fm-btn.save-f .fm-icon {
      background: rgba(34, 197, 94, .15);
      color: var(--green);
    }

    .fm-btn.paste-f .fm-icon {
      background: rgba(245, 158, 11, .12);
      color: var(--yellow);
    }

    .fm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      z-index: 40;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }

    .fm-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--s3);
      border: 1px solid var(--b2);
      color: var(--text);
      padding: 9px 20px;
      border-radius: 22px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      pointer-events: none;
      z-index: 200;
      opacity: 0;
      transition: all .28s cubic-bezier(.34, 1.56, .64, 1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, .5);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* OFFLINE INDICATOR - hidden */
    .offline-dot {
      display: none;
    }

    /* ── NOTES SHEET ─────────────────────── */
    .notes-menu {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--s1);
      border-top: 1px solid var(--b2);
      border-radius: 20px 20px 0 0;
      padding: 16px 16px;
      padding-bottom: calc(20px + var(--safe-b));
      display: flex;
      flex-direction: column;
      gap: 10px;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.32, 1.2, .64, 1);
      z-index: 50;
      box-shadow: 0 -20px 60px rgba(0,0,0,.5);
      max-height: 82dvh;
    }
    .notes-menu.open { transform: translateY(0); }

    .nm-tabs {
      display: flex;
      gap: 0;
      background: var(--s2);
      border: 1px solid var(--b1);
      border-radius: 10px;
      padding: 3px;
    }
    .nm-tab {
      flex: 1;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 700;
      padding: 8px 0;
      border-radius: 7px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
    }
    .nm-tab.active {
      background: var(--s3);
      border: 1px solid var(--b2);
      color: var(--text);
    }

    .nm-save-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .nm-save-input {
      flex: 1;
      background: var(--s2);
      border: 1px solid var(--b2);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
      caret-color: var(--accent);
    }
    .nm-save-input::placeholder { color: var(--muted); font-family: var(--sans); }
    .nm-save-btn {
      padding: 10px 18px;
      border-radius: 10px;
      background: var(--accent);
      border: none;
      color: #fff;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .nm-save-btn:active { background: var(--accent-d); }

    .nm-list {
      overflow-y: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 0;
      -webkit-overflow-scrolling: touch;
    }
    .nm-empty {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 24px 0;
      font-style: italic;
    }
    .nm-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: var(--s2);
      border: 1px solid var(--b1);
      border-radius: 12px;
      cursor: pointer;
      transition: all .12s;
      flex-shrink: 0;
    }
    .nm-item:active { background: var(--s3); }
    .nm-item-body { flex: 1; min-width: 0; }
    .nm-item-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .nm-item-meta {
      font-size: 10px;
      color: var(--muted);
      font-family: var(--mono);
      margin-top: 2px;
    }
    .nm-item-preview {
      font-size: 11px;
      color: var(--dim);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .nm-del {
      flex-shrink: 0;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      line-height: 1;
    }
    .nm-del:active { color: #f87171; background: rgba(239,68,68,.1); }

    .nm-footer {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .nm-foot-btn {
      flex: 1;
      padding: 10px 0;
      border-radius: 10px;
      background: var(--s2);
      border: 1px solid var(--b1);
      color: var(--dim);
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .03em;
    }
    .nm-foot-btn:active { background: var(--s3); color: var(--text); }
    .nm-foot-btn.danger { color: #f87171; border-color: rgba(239,68,68,.2); }
    .nm-foot-btn.danger:active { background: rgba(239,68,68,.1); }
    /* ══════════════════════════════════════
       DESKTOP LAYOUT (≥768px)
       ══════════════════════════════════════ */
    @media (min-width: 768px) {

      /* content-row делит редактор и sidebar */
      .content-row {
        display: flex;
        flex-direction: row;
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }

      .main-col {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Sidebar заметок справа */
      .notes-sidebar {
        width: 280px;
        flex-shrink: 0;
        background: var(--s1);
        border-left: 1px solid var(--b1);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .notes-sidebar-header {
        display: flex;
        align-items: center;
        padding: 12px 14px 0;
        flex-shrink: 0;
      }

      .notes-sidebar-title {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .1em;
        color: var(--muted);
      }

      .notes-sidebar .nm-tabs {
        margin: 10px 14px 0;
        flex-shrink: 0;
      }

      .notes-sidebar .nm-save-row {
        padding: 10px 14px 0;
        flex-shrink: 0;
      }

      .notes-sidebar .nm-list {
        padding: 8px 14px 0;
        flex: 1;
        overflow-y: auto;
      }

      .notes-sidebar .nm-footer {
        padding: 8px 14px 12px;
        flex-shrink: 0;
      }

      .notes-sidebar #nm-saved-panel {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }

      .notes-sidebar #nm-saved-panel.nm-hidden,
      .notes-sidebar #nm-hist-panel.nm-hidden {
        display: none !important;
      }

      .notes-sidebar #nm-hist-panel {
        flex-direction: column;
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }

      /* Кнопка Заметки в bottom bar — скрыть */
      .btn-notes-mobile { display: none !important; }

      /* Bottom bar — 5 колонок */
      .btm { grid-template-columns: 1fr 1fr 1.6fr 1.6fr 1fr !important; }

      /* Bottom sheet на десктопе не нужен */
      .notes-menu, #nm-overlay { display: none !important; }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-top">
      <div class="stats-row" id="stats-row">
        <div class="chip"><b id="sc">0</b> сим</div>
        <div class="chip"><b id="sw">0</b> сл</div>
        <div class="chip" id="sent-chip" style="display:none"><b id="ss">0</b> пред</div>
        <div class="chip" id="para-chip" style="display:none"><b id="sp">0</b> абз</div>
      </div>
      <button class="install-btn" id="install-btn" aria-label="Установить приложение">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" />
        </svg>
        Установить
      </button>
      <button class="presets-hdr-btn" onclick="openPresetsSheet()" aria-label="Пресеты и регулярки">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
        Пресеты
      </button>
      <button class="file-hdr-btn" onclick="openFileMenu()" aria-label="Работа с файлами">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
        </svg>
        Файл
      </button>
    </div>

    <!-- FORMAT: категории -->
    <div class="fmt-cats" id="fmt-cats">
      <button class="fmt-cat active" onclick="setFmtCat('spaces',this)" aria-label="Пробелы">Пробелы</button>
      <button class="fmt-cat" onclick="setFmtCat('register',this)" aria-label="Регистр">Регистр</button>
      <button class="fmt-cat" onclick="setFmtCat('punct',this)" aria-label="Пунктуация">Пунктуация</button>
      <button class="fmt-cat" onclick="setFmtCat('struct',this)" aria-label="Структура">Структура</button>
    </div>
    <!-- FORMAT: кнопки выбранной категории -->
    <div class="fmt-btns" id="fmt-btns"></div>
  </div>

  <!-- SYMBOLS BAR -->
  <div class="sym-bar">
    <div class="sym-head">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.35-4.35" />
      </svg>
      Символы
      <span class="sym-badge" id="sym-n">0</span>
    </div>

    <!-- TAB SWITCHER — full width -->
    <div class="sym-tabs">
      <button class="sym-tab active" id="tab-detect" onclick="switchTab('detect')"
        aria-label="Удалить символы">Удалить</button>
      <button class="sym-tab" id="tab-replace" onclick="switchTab('replace')"
        aria-label="Заменить символы">Заменить</button>
    </div>

    <!-- DETECT TAB -->
    <div class="sym-scroll" id="sym-scroll">
      <span class="sym-empty">Не найдено</span>
    </div>

    <!-- REPLACE TAB -->
    <div class="replace-panel" id="replace-panel">
      <div class="rp-field">
        <span class="rp-label">что</span>
        <input id="rp-from" type="text" placeholder="символ для замены" maxlength="50" autocomplete="off"
          spellcheck="false">
      </div>
      <div class="rp-field">
        <span class="rp-label">на</span>
        <input id="rp-to" type="text" placeholder="чем заменить" maxlength="50" autocomplete="off" spellcheck="false">
      </div>
      <div class="rp-pair-hint" id="rp-pair-hint"></div>
      <div class="rp-row">
        <button class="rp-btn" onclick="doReplace()" aria-label="Выполнить замену">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path
              d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4" />
          </svg>
          Заменить
        </button>
        <button class="rp-btn clear-btn" onclick="clearReplace()" aria-label="Очистить поля замены"
          title="Очистить поля">✕</button>
      </div>
    </div>
  </div>

  <!-- CONTENT ROW: editor + sidebar -->
  <div class="content-row">
  <!-- EDITOR AREA -->
  <div class="main-col">
  <div class="editor-wrap" role="main">
    <div class="file-banner" id="file-banner">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
        <polyline points="14 2 14 8 20 8" />
      </svg>
      <span class="file-name" id="file-name">—</span>
      <span class="file-close" onclick="closeFile()" role="button" aria-label="Закрыть файл" tabindex="0">✕</span>
    </div>
    <textarea id="ed" aria-label="Текстовое поле для форматирования"
      placeholder="Вставьте или введите текст…&#10;&#10;• Кнопки сверху — форматирование&#10;• Найденные символы появятся в строке выше&#10;• Внизу — работа с файлами и буфером обмена"
      spellcheck="false" autocorrect="off" autocapitalize="off">
  </textarea>
    <div class="diff-pill" id="diff-pill"></div>
  </div>

  <!-- BOTTOM BAR -->
  <div class="btm" style="grid-template-columns: 1fr 1fr 1.6fr 1.6fr 1fr 1fr;">
    <button class="b-btn" onclick="doUndo()" aria-label="Отменить действие">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M3 7v6h6" />
        <path d="M3 13a9 9 0 1 0 2.83-6.36L3 9" />
      </svg>
      Назад
    </button>
    <button class="b-btn" onclick="doRedo()" aria-label="Повторить действие">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 7v6h-6" />
        <path d="M21 13a9 9 0 1 1-2.83-6.36L21 9" />
      </svg>
      Вперёд
    </button>
    <button class="b-btn green" onclick="doPaste()" aria-label="Вставить из буфера обмена">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
        <rect x="8" y="2" width="8" height="4" rx="1" />
      </svg>
      Вставить
    </button>
    <button class="b-btn blue" onclick="doCopy()" aria-label="Копировать текст">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <rect x="9" y="9" width="13" height="13" rx="2" />
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
      </svg>
      Копировать
    </button>
    <button class="b-btn red" onclick="doClear()" aria-label="Очистить текст">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="3 6 5 6 21 6" />
        <path d="M19 6l-1 14H6L5 6" />
        <path d="M10 11v6M14 11v6" />
      </svg>
      Стереть
    </button>
    <button class="b-btn btn-notes-mobile" onclick="openNotesMenu()" aria-label="Заметки и история" style="color:var(--yellow);border-color:rgba(245,158,11,.25)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>

      <button class="modal-btn" onclick="closeRegexModal()">Отмена</button>
      <button class="modal-btn" onclick="testRegex()" style="flex:.7;color:var(--yellow);border-color:rgba(245,158,11,.25)">Тест</button>
      <button class="modal-btn accent" onclick="saveRegexFromModal()">Сохранить</button>
